name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Signal.app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Run hook tests
        run: python3 -m unittest discover -s tests -v
      - name: Verify Homebrew tap token
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN is not set. Add a fine-grained or classic PAT with contents:write on thepranky/homebrew-signal."
            exit 1
          fi
      - name: Stamp version from tag
        working-directory: app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Resources/Info.plist
      - name: Build app bundle
        working-directory: app
        run: ./build-app.sh
      - name: Build DMG
        working-directory: app
        run: ./build-dmg.sh Signal-${{ github.ref_name }}.dmg
      - name: Zip app
        working-directory: app
        run: ditto -c -k --sequesterRsrc --keepParent Signal.app Signal-${{ github.ref_name }}.zip
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            app/Signal-${{ github.ref_name }}.dmg
            app/Signal-${{ github.ref_name }}.zip
          generate_release_notes: true
      - name: Sync Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="$(shasum -a 256 "app/Signal-${GITHUB_REF_NAME}.dmg" | cut -d' ' -f1)"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/thepranky/homebrew-signal.git" tap-repo

          mkdir -p tap-repo/Casks
          scripts/write-cask.sh "$VERSION" "$SHA" tap-repo/Casks/signal-agent.rb
          rm -f tap-repo/Casks/signal.rb

          cat > tap-repo/README.md <<'EOF'
          # homebrew-signal

          Homebrew tap for [Signal](https://github.com/thepranky/signal).

          This repository is synced automatically from the main Signal repo.
          Do not edit the cask here by hand.

          ```bash
          brew install --cask thepranky/signal/signal-agent
          ```
          EOF

          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Tap already up to date."
            exit 0
          fi
          git commit -m "Update signal-agent cask to v${VERSION}"
          git push origin HEAD:main
