name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-hooks:
    name: Hook tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run hook tests
        run: python3 -m unittest discover -s tests -v

  build-app:
    name: Build Signal.app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Show toolchain
        run: swift --version
      - name: Build app bundle
        working-directory: app
        run: ./build-app.sh
      - name: Verify code signature
        working-directory: app
        run: codesign --verify --deep --strict --verbose=2 Signal.app
      - name: Build DMG
        working-directory: app
        run: ./build-dmg.sh Signal.dmg
      - name: Zip app
        working-directory: app
        run: ditto -c -k --sequesterRsrc --keepParent Signal.app Signal.zip
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Signal-app
          path: |
            app/Signal.zip
            app/Signal.dmg
          if-no-files-found: error
