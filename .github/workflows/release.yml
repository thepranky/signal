name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Signal.app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Run hook tests
        run: python3 -m unittest discover -s tests -v
      - name: Build app bundle
        working-directory: app
        run: ./build-app.sh
      - name: Zip app
        working-directory: app
        run: ditto -c -k --sequesterRsrc --keepParent Signal.app Signal-${{ github.ref_name }}.zip
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: app/Signal-${{ github.ref_name }}.zip
          generate_release_notes: true
